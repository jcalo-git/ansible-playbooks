    #       #!/bin/bash
    #       /usr/bin/rkhunter --cronjob --update --nocolors --quiet

    # ----------------------------------------------------------
    #  SECTION 12 — Install updates
    # ----------------------------------------------------------

    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Check if system requires a reboot
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      changed_when: false

    - name: Display variable
      ansible.builtin.debug:
        msg: '{{ reboot_required_file.stat.exists }}'

    # ----------------------------------------------------------
    #  SECTION 13 — Summary
    # ----------------------------------------------------------
 
    - name: Bootstrap summary
      debug:
        msg:
          - "=========================================="
          - " Hardening complete: {{ inventory_hostname }}"
          - "=========================================="
          - "  User      : {{ admin_user }}"
          - "  SSH port  : {{ ssh_port }}"
          - "  Timezone  : {{ timezone }}"
          - "  NTP pool  : {{ ntp_pool }}"
          - "  UFW       : enabled (deny inbound)"
          - "  Fail2ban  : enabled"
          - "  Auditd    : enabled"
          - "  rkhunter  : enabled"
          - "  Reboot    : {{ reboot_required_file.stat.exists | default(false) }}"
          - "=========================================="
          - " IMPORTANT: Test your new SSH session"
          - " BEFORE closing this one:"
          - " ssh -p {{ ssh_port }} {{ admin_user }}@{{ inventory_hostname }}"
          - "=========================================="
 
    # Flush all pending handlers first (sshd, fail2ban, auditd restarts)
    # so services are in their final state before we reboot.
    - name: Flush handlers before reboot
      meta: flush_handlers
 
    - name: Reboot
      ansible.builtin.reboot:
        msg: "Rebooting.."
        connect_timeout: 10
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 60
        test_command: uptime
      when: reboot_required_file.stat.exists
      register: reboot_result
 
  # ----------------------------------------------------------
  #  Handlers
  # ----------------------------------------------------------
  handlers:
 
    - name: Restart sshd
      systemd:
        name: ssh
        state: restarted
 
    - name: Restart chrony
      systemd:
        name: chrony
        state: restarted
 
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
 
    - name: Restart auditd
      systemd:
        name: auditd
        state: restarted