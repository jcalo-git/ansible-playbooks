    #     state: present
    #     backup: true
    #   loop:
    #     - { regexp: '^#?UPDATE_MIRRORS',      line: 'UPDATE_MIRRORS=1' }
    #     - { regexp: '^#?MIRRORS_MODE',        line: 'MIRRORS_MODE=0' }
    #     - { regexp: '^#?WEB_CMD',             line: 'WEB_CMD="/usr/bin/curl -fsSL -o"' }
    #     - { regexp: '^#?CRON_DAILY_RUN',      line: 'CRON_DAILY_RUN="true"' }
    #     - { regexp: '^#?REPORT_EMAIL',        line: 'REPORT_EMAIL="{{ alert_email }}"' }
    #     - { regexp: '^#?MAIL-ON-WARNING',     line: 'MAIL-ON-WARNING="{{ alert_email }}"' }
    #     - { regexp: '^#?AUTO_X_DETECT',       line: 'AUTO_X_DETECT=0' }
    #     - { regexp: '^#?ALLOW_SSH_ROOT_USER', line: 'ALLOW_SSH_ROOT_USER=no' }
    #     - { regexp: '^#?ALLOW_SSH_PROT_V1',  line: 'ALLOW_SSH_PROT_V1=0' }
    #     - { regexp: '^#?SSH_CONFIG_DIR',      line: 'SSH_CONFIG_DIR=/etc/ssh' }

    # - name: Update rkhunter database
    #   command: rkhunter --update --nocolors
    #   register: rkhunter_update
    #   # rc 0=updated, rc 2=already up to date, rc 1=mirror unreachable
    #   # mirror failures are common with Ubuntu 1.4.6 -- warn, don't fail
    #   failed_when: false
