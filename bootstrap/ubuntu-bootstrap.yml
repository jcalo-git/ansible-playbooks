---
# ============================================================
#  ubuntu-bootstrap/bootstrap.yml
#
#  Hardens a fresh Ubuntu host:
#    - Timezone & NTP (chrony)
#    - Admin user + SSH key
#    - SSH lockdown
#    - UFW firewall
#    - Fail2ban
#    - Unattended security upgrades
#    - Kernel / sysctl hardening
#    - Auditd
#    - rkhunter
#
#  Prerequisites:
#    1. Fill in ubuntu-bootstrap/vars/secrets.yml
#    2. Ensure community.general collection is installed:
#
#  Run from repo root:
#    ansible-playbook ubuntu-bootstrap/bootstrap.yml \
#      -e target_host=192.168.1.10 -K
#
#  Override any config.yml default inline:
#    ansible-playbook ubuntu-bootstrap/bootstrap.yml \
#      -e target_host=192.168.1.10 -e ssh_port=2222 -K
#
#  -K prompts for the remote sudo password.
#  Omit if your remote user already has passwordless sudo.
# ============================================================
- name: Ubuntu host hardening
  hosts: "{{ target_host }}"
  become: true
  become_method: sudo
  gather_facts: true

  vars_files:
    - vars/config.yml
    - vars/secrets.yml

  pre_tasks:

    - name: Assert target_host was provided
      assert:
        that: target_host is defined and target_host != ''
        fail_msg: >
          No target host specified. Run with:
          ansible-playbook ubuntu-bootstrap/bootstrap.yml -e target_host=<ip-or-hostname> -K

    - name: Assert Ubuntu or Debian target
      assert:
        that: ansible_facts['distribution'] in ['Ubuntu', 'Debian']
        fail_msg: "This playbook targets Ubuntu or Debian only."

    - name: Validate password hash format
      assert:
        that: (admin_password_hash | regex_search('^\$[0-9]\$')) is not none
        fail_msg: >
          admin_password_hash in vars/secrets.yml looks wrong.
          Generate with: openssl passwd -6 'yourpassword'

    - name: Validate SSH public key format
      assert:
        that: (admin_ssh_pubkey | trim | regex_search('^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp256|ecdsa-sha2-nistp384|ecdsa-sha2-nistp521) ')) is not none
        fail_msg: >
          admin_ssh_pubkey in vars/secrets.yml looks wrong.
          Expected to start with ssh-ed25519, ssh-rsa, or ecdsa-sha2-nistp256.
          Check for leading/trailing whitespace or newlines around the value.

    # ----------------------------------------------------------
    #  Section 1 - Timezone & NTP
    # ----------------------------------------------------------

    - name: Set system timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Install chrony (NTP)
      apt:
        name: chrony
        state: present

    - name: Deploy chrony config
      copy:
        dest: /etc/chrony/chrony.conf
        mode: "0644"
        content: |
          # Managed by Ansible
          pool {{ ntp_pool }} iburst maxsources 4
          keyfile /etc/chrony/chrony.keys
          driftfile /var/lib/chrony/chrony.drift
          logdir /var/log/chrony
          maxupdateskew 100.0
          rtcsync
          makestep 1 3
      notify: Restart chrony

    - name: Enable and start chrony
      systemd:
        name: chrony
        enabled: true
        state: started

    - name: Force immediate time sync
      command: chronyc makestep
      changed_when: false

    - name: Verify time sync status
      command: chronyc tracking
      register: chrony_status
      changed_when: false

    - name: Show time sync status
      debug:
        var: chrony_status.stdout_lines

    # ----------------------------------------------------------
    #  Section 2 - Full apt refresh 
    # ----------------------------------------------------------

    - name: Full apt cache refresh
      apt:
        update_cache: true
        cache_valid_time: 0

  tasks:

    # ----------------------------------------------------------
    #  SECTION 3 — Base packages + additional 
    # ----------------------------------------------------------

    - name: Install baseline + additional packages
      apt:
        name: "{{ ((baseline_packages | default([])) + (additional_packages | default([]))) | unique }}"
        state: present

    # ----------------------------------------------------------
    #  SECTION 4 — Admin user
    # ----------------------------------------------------------

    - name: Create admin group
      group:
        name: "{{ admin_user }}"
        state: present

    - name: Create admin user
      user:
        name: "{{ admin_user }}"
        group: "{{ admin_user }}"
        groups: sudo
        append: true
        shell: /bin/bash
        create_home: true
        password: "{{ admin_password_hash }}"
        comment: "Managed admin account"
        state: present

    - name: Lock root account password
      user:
        name: root
        password_lock: true

    - name: Ensure .ssh directory exists for admin user
      file:
        path: "/home/{{ admin_user }}/.ssh"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0700"

    - name: Deploy authorised SSH key
      authorized_key:
        user: "{{ admin_user }}"
        key: "{{ admin_ssh_pubkey | trim }}"
        path: "/home/{{ admin_user }}/.ssh/authorized_keys"
        state: present
        exclusive: false

    - name: Configure sudoers for admin user
      copy:
        dest: "/etc/sudoers.d/{{ admin_user }}"
        content: |
          # Managed by Ansible — do not edit manually
          {{ admin_user }} ALL=(ALL:ALL) NOPASSWD: ALL
        validate: "visudo -cf %s"
        mode: "0440"

    # ----------------------------------------------------------
    #  SECTION 5 — SSH hardening
    # ----------------------------------------------------------

    - name: Harden sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        backup: true
      loop:
        - { regexp: '^#?PermitRootLogin',                 line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication',          line: 'PasswordAuthentication no' }
        - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
        - { regexp: '^#?KbdInteractiveAuthentication',    line: 'KbdInteractiveAuthentication no' }
        - { regexp: '^#?PermitEmptyPasswords',            line: 'PermitEmptyPasswords no' }
        - { regexp: '^#?X11Forwarding',                   line: 'X11Forwarding no' }
        - { regexp: '^#?AllowAgentForwarding',            line: 'AllowAgentForwarding no' }
        - { regexp: '^#?AllowTcpForwarding',              line: 'AllowTcpForwarding no' }
        - { regexp: '^#?MaxAuthTries',                    line: 'MaxAuthTries 3' }
        - { regexp: '^#?LoginGraceTime',                  line: 'LoginGraceTime 30' }
        - { regexp: '^#?ClientAliveInterval',             line: 'ClientAliveInterval 300' }
        - { regexp: '^#?ClientAliveCountMax',             line: 'ClientAliveCountMax 2' }
        - { regexp: '^#?Protocol',                        line: 'Protocol 2' }
        - { regexp: '^#?LogLevel',                        line: 'LogLevel VERBOSE' }
        - { regexp: '^#?UsePAM',                          line: 'UsePAM yes' }
        - { regexp: '^#?PrintLastLog',                    line: 'PrintLastLog yes' }
        - { regexp: '^#?Banner',                          line: 'Banner /etc/issue.net' }
        - { regexp: '^#KexAlgorithms',                    line: 'KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256'  }
        - { regexp: '^#Ciphers',                          line: 'Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr' }
        - { regexp: '^#MACs',                             line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com,hmac-sha2-512,hmac-sha2-256,umac-128@openssh.com' }
        - { regexp: '^#MaxSessions',                      line: 'MaxSessions 2' }
        - { regexp: '^#TCPKeepAlive',                      line: 'TCPKeepAlive no' }
      notify: Restart sshd

    # - name: Restrict SSH to admin user only
    #   lineinfile:
    #     path: /etc/ssh/sshd_config
    #     regexp: '^#?AllowUsers'
    #     line: "AllowUsers {{ admin_user }}"
    #     state: present
    #   notify: Restart sshd

    - name: Set SSH port
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port '
        line: "Port {{ ssh_port }}"
        state: present
      notify: Restart sshd

    - name: Deploy login warning banner
      copy:
        dest: /etc/issue.net
        content: |
          *********************************************************************
          * This is a private system. Unauthorized access is prohibited.      *
          * All activities on this system are monitored and recorded. By      *
          * logging in, you acknowledge and consent to this monitoring.       *
          * Unauthorized or malicious use of this system will be reported     *
          * to the appropriate authorities and may result in legal            *
          * consequences.                                                     *
          * If you are not an authorized user, please disconnect immediately. *
          *********************************************************************
          
        mode: "0644"

    # ----------------------------------------------------------
    #  SECTION 6 — Firewall (UFW)
    # ----------------------------------------------------------

    - name: Set UFW default — deny all inbound
      ufw:
        direction: incoming
        policy: deny

    - name: Set UFW default — allow all outbound
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow configured SSH port
      ufw:
        rule: allow
        port: "{{ ssh_port | string }}"
        proto: tcp
        comment: SSH

    - name: Allow additional ports
      ufw:
        rule: allow
        port: "{{ item.port | string }}"
        proto: "{{ item.proto | default('tcp') }}"
        comment: "{{ item.comment | default('') }}"
      loop: "{{ extra_open_ports | default([]) }}"

    - name: Enable UFW
      ufw:
        state: enabled

    # ----------------------------------------------------------
    #  SECTION 7 — Fail2ban
    # ----------------------------------------------------------

    - name: Deploy fail2ban jail.local
      copy:
        dest: /etc/fail2ban/jail.local
        mode: "0644"
        content: |
          [DEFAULT]
          bantime   = 1h
          findtime  = 10m
          maxretry  = 5
          backend   = systemd

          [sshd]
          enabled  = true
          port     = {{ ssh_port }}
          logpath  = %(sshd_log)s
          maxretry = 3
          bantime  = 24h
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: true
        state: started

    # ----------------------------------------------------------
    #  SECTION 8 — Unattended security upgrades
    # ----------------------------------------------------------

    - name: Configure unattended-upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: "0644"
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Mail "{{ alert_email }}";
          Unattended-Upgrade::MailReport "on-change";

    - name: Enable daily upgrade timer
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";

    # ----------------------------------------------------------
    #  SECTION 9 — Kernel / sysctl hardening
    # ----------------------------------------------------------

    - name: Apply sysctl hardening settings
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-hardening.conf
      loop:
        - { key: net.ipv4.ip_forward,                        value: "0" }
        - { key: net.ipv6.conf.all.forwarding,               value: "0" }
        - { key: net.ipv4.conf.all.accept_source_route,      value: "0" }
        - { key: net.ipv4.conf.default.accept_source_route,  value: "0" }
        - { key: net.ipv4.icmp_echo_ignore_broadcasts,       value: "1" }
        - { key: net.ipv4.icmp_ignore_bogus_error_responses, value: "1" }
        - { key: net.ipv4.conf.all.rp_filter,                value: "1" }
        - { key: net.ipv4.conf.default.rp_filter,            value: "1" }
        - { key: net.ipv4.tcp_syncookies,                    value: "1" }
        - { key: net.ipv4.conf.all.log_martians,             value: "1" }
        - { key: net.ipv4.conf.all.accept_redirects,         value: "0" }
        - { key: net.ipv4.conf.all.send_redirects,           value: "0" }
        - { key: net.ipv6.conf.all.accept_redirects,         value: "0" }
        - { key: net.ipv6.conf.all.disable_ipv6,             value: "{{ '0' if enable_ipv6 else '1' }}" }
        - { key: kernel.randomize_va_space,                  value: "2" }
        - { key: kernel.dmesg_restrict,                      value: "1" }
        - { key: kernel.kptr_restrict,                       value: "2" }
        - { key: fs.protected_hardlinks,                     value: "1" }
        - { key: fs.protected_symlinks,                      value: "1" }

    # ----------------------------------------------------------
    #  SECTION 10 — Auditd
    # ----------------------------------------------------------

    - name: Deploy auditd rules
      copy:
        dest: /etc/audit/rules.d/99-hardening.rules
        mode: "0640"
        content: |
          -w /etc/passwd     -p wa -k identity
          -w /etc/shadow     -p wa -k identity
          -w /etc/group      -p wa -k identity
          -w /etc/gshadow    -p wa -k identity
          -w /etc/sudoers    -p wa -k sudoers
          -w /etc/sudoers.d/ -p wa -k sudoers
          -w /etc/ssh/sshd_config -p wa -k sshd
          -w /var/log/faillog -p wa -k logins
          -w /var/log/lastlog -p wa -k logins
          -a always,exit -F arch=b64 -S execve -F euid=0 -k root_commands
      notify: Restart auditd

    - name: Enable and start auditd
      systemd:
        name: auditd
        enabled: true
        state: started

    # ----------------------------------------------------------
    #  SECTION 11 — rkhunter
    #  Configure FIRST so WEB_CMD is set before any network ops.
    # ----------------------------------------------------------
 
    # - name: Configure rkhunter
    #   lineinfile:
    #     path: /etc/rkhunter.conf
    #     regexp: "{{ item.regexp }}"
