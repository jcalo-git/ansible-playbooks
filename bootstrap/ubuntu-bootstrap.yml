    # - name: Warn if rkhunter update failed
    #   debug:
    #     msg: >
    #       WARNING: rkhunter --update failed (rc={{ rkhunter_update.rc }}).
    #       Mirrors may be unreachable. Baseline will be set from locally
    #       installed data. Re-run manually: sudo rkhunter --update
