---
- name: macOS bootstrap & update
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts['architecture'] == 'arm64' else '/usr/local' }}"
    brew_bin: "{{ homebrew_prefix }}/bin/brew"

   # brew_packages:
    #  - git
    #  - python

  tasks:

    # ----------------------------
    # Homebrew
    # ----------------------------
    - name: Check if Homebrew is installed
      stat:
        path: "{{ brew_bin }}"
      register: brew_check

    - name: Install Homebrew
      command: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not brew_check.stat.exists

    - name: Update Homebrew
      command: "{{ brew_bin }} update"
      environment:
        HOMEBREW_NONINTERACTIVE: "1"

    # Formulae only: full `brew upgrade` also upgrades casks, which often need
    # sudo/TTY (e.g. fuse-t) and will fail under non-interactive Ansible.
    - name: Upgrade Homebrew formulae
      command: "{{ brew_bin }} upgrade --formula"
      environment:
        HOMEBREW_NONINTERACTIVE: "1"

    #- name: Install required brew packages
     # command: "{{ brew_bin }} install {{ item }}"
     # loop: "{{ brew_packages }}"
     # register: brew_install_results
     # changed_when: "'already installed' not in brew_install_results.stdout"

    # ----------------------------
    # macOS system updates
    # ----------------------------
    - name: Check for macOS updates
      command: softwareupdate -l
      register: macos_updates
      changed_when: false

    - name: Install macOS updates
      command: softwareupdate -i -a
      when: "'No new software available' not in macos_updates.stdout"

    # ----------------------------
    # Python package updates (safe mode)
    # ----------------------------
    - name: List outdated Python packages
      command: python3 -m pip list --outdated
      register: pip_outdated
      changed_when: false
      failed_when: false

    - name: Show outdated Python packages
      debug:
        var: pip_outdated.stdout_lines
