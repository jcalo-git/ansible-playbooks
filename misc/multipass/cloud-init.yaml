#cloud-config
package_update: true
package_upgrade: true

# Install Ansible (optional, if the target itself runs playbooks)
packages:
  - ansible

# --- Users ---
users:
  # 1) Your normal human user – full shell, password‑less sudo
  - name: ansible
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP9G+60Cnpqke01Su6qXMXexIAjFyemGkIfgGiyE4xkj

  # 2) Break‑glass ubuntu fallback – same key, unchanged
  - name: ubuntu
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-rsa 

  